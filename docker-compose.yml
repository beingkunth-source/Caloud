services:
  postgres:
    image: postgres:16-alpine
    container_name: cloud-cost-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloud_cost_calculator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cloud_cost_calculator"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cloud-cost-api
    environment:
      API_PORT: 4000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cloud_cost_calculator
      JWT_SECRET: dev-only-secret
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: cloud-cost-web
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
